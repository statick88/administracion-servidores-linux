    - part: "UNIDAD V: Gestión de Procesos y Logs"
      chapters:
        - "05-procesos/index.qmd"
    
    - part: "UNIDAD VI: Redes y Almacenamiento Local"
      chapters:
        - "06-redes/index.qmd"
    
    - part: "UNIDAD VII: Seguridad Práctica - Hardening"
      chapters:
        - "07-seguridad/index.qmd"
    
    - part: "UNIDAD VIII: Introducción a Docker"
      chapters:
