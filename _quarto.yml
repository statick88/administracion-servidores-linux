project:
  type: book
  output-dir: docs
  resources:
    - ".nojekyll"
    - "recursos"
    - "images"
    - "logo.jpeg"
  post-render:
    - "quarto render presentaciones"

book:
  title: "Administración de Servidores Linux"
  author: "Diego Saavedra - Instructor Principal"
  subtitle: "Curso Profesional para Abacom™"
  output-file: "administracion_servidores_linux"
  date: today
  date-format: medium
  favicon: "logo.jpeg"
  description: "Curso Completo de Administración de Servidores Linux para Profesionales de TI - Dictado para Abacom"
  keyword: "Linux, Servidores, Administración, Sistemas Operativos, Redes, Seguridad, Abacom"
  url: "https://statick88.github.io/administracion-servidores-linux"
  page-navigation: true
  sidebar:
    logo: "logo.jpeg"
    search: true
    collapse-level: 1
    pinned: true
   
  repo-url: "https://github.com/statick88/administracion-servidores-linux"
  repo-branch: main
  repo-actions:
    - edit
    - issue
  sharing:
    - twitter
    - linkedin

  image: "logo.jpeg"
   
  page-footer:
    center:
      - text: "Sobre el Curso"
        href: "about.qmd"
      - text: "Licencia"
        href: "license.qmd"
      - text: "Instructor: statick88.github.io"
        href: "https://statick88.github.io"

  chapters:
    - "index.qmd"
    
    - part: "Introducción al Curso"
      chapters:
        - "about.qmd"
        - "license.qmd"
        - "SETUP.qmd"
        - "glosario.qmd"
    
    - part: "UNIDAD I: Fundamentos de Linux y Virtualización Ligera"
